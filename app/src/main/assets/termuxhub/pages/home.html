<div class="screen" id="view-home">
    <!-- Header Block -->
    <div class="screen-header">
        <div class="header-meta">
            <span class="header-label">Learn • Install • Build</span>
            <h2 class="header-heading">TermuxHub</h2>
        </div>
        <div class="header-action" id="header-search-trigger" title="Global Search">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </div>
    </div>
    
    <!-- Central Content Area -->
    <div class="screen-scroller">
        <!-- Interactive search bar component container -->
        <div id="home-search-container"></div>
        
        <!-- F-Droid Recommended banner (as instructed: Recommend F-Droid only for Termux installation) -->
        <div id="fdroid-notice-banner" class="category-card" style="flex-direction: row; align-items: center; border-color: var(--secondary); background: rgba(0, 229, 255, 0.05); margin-bottom: 24px; padding: 16px;">
            <div class="category-badge" style="background: rgba(0, 229, 255, 0.1); width: 40px; height: 40px; font-size: 1.3rem;">📲</div>
            <div style="flex-grow: 1; min-width: 0; padding-left: 14px;">
                <h4 style="font-size: 0.9rem; font-weight: 800; color: var(--secondary)">Install Termux correctly</h4>
                <p style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.3; margin-top: 2px;">
                    Google Play updates are discontinued. Download solely from <strong>F-Droid</strong>.
                </p>
            </div>
            <span style="font-size: 1rem; color: var(--secondary)">➜</span>
        </div>
        
        <!-- Grid header title -->
        <h3 class="copiable-label" style="margin-bottom: 16px; font-size: 0.85rem;">Learning Modules</h3>
        
        <!-- Dynamic Categories Grid mounted here -->
        <div class="categories-grid" id="categories-list-target"></div>
        
        <!-- Sub-actions grid/links like Favorites, History, Settings and About -->
        <div style="margin-top: 24px;">
            <h3 class="copiable-label" style="margin-bottom: 12px; font-size: 0.85rem;">Quick Panels</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;">
                <div class="tool-card testTag_quick_favorites" id="subpanel-favorites" style="padding: 12px 16px; cursor: pointer;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 1.2rem;">⭐</span>
                        <span style="font-size: 0.85rem; font-weight: 700;">Favorites</span>
                    </div>
                </div>
                <div class="tool-card testTag_quick_recent" id="subpanel-recent" style="padding: 12px 16px; cursor: pointer;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 1.2rem;">🕒</span>
                        <span style="font-size: 0.85rem; font-weight: 700;">Recent</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="brand-footer" style="text-align: center; margin-top: 20px;">
            Built with ❤️ by Maya
        </div>
    </div>
</div>
